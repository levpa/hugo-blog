baseURL: https://levarc.com/
languageCode: en-us
title: Lev's blog
theme: PaperMod

minify:
  disableXML: true
  minifyOutput: true

services:
  googleAnalytics:
    ID: G-KWYLJH7QDH
  disqus:
    shortname: levarc

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  env: production
  title: Lev's blog
  description: "DevOps Engineer from Severodonetsk"
  keywords: [Blog, Automation, DevOps, SRE, AWS, Azure, GCP]
  author: Lev Pa
  contact:
    email: support@levarc.com
  subtitle: all about tech
  DateFormat: "January 2, 2006"
  defaultTheme: auto
  disableThemeToggle: false

  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: false
  ShowCodeCopyButtons: false
  ShowWordCount: false
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: false
  tocopen: false
  
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

  assets:
    favicon: /img/favicon.ico
    favicon16x16: /img/favicon-16x16.png
    favicon32x32: /img/favicon-32x32.png
    apple_touch_icon: /img/apple-touch-icon.png
    safari_pinned_tab: /img/safari-pinned-tab.svg

  profileMode:
    enabled: true # needs to be explicitly set
    title: Engineer stuff
    subtitle: Architecture, automation
    imageUrl: /img/blog_icon.png
    imageWidth: 250
    imageHeight: 250
    imageTitle: Lev's logo
    buttons:
      - name: Posts
        url: posts
      - name: Tags
        url: tags

  socialIcons:
    - name: github
      url: "https://github.com/levpa"
    - name: linkedin
      url: "https://www.linkedin.com/in/levpa/"
    - name: buymeacoffee
      url: "https://buymeacoffee.com/levpa"

pygmentsUseClasses: true
markup:
  highlight:
    noClasses: false